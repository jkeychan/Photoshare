services:
  webapp:
    build: .
    volumes:
      # Data disk mounts only — do NOT bind-mount source code;
      # the image must be rebuilt to deploy code changes.
      - ./static:/mnt/web/photoshare/static
      - /mnt/photoshare/media:/mnt/web/photoshare/static/media
      - /mnt/photoshare/uploads:/mnt/web/photoshare/uploads
    environment:
      - FLASK_ENV=${FLASK_ENV}
      - FKEY=${FKEY}
      - WTFKEY=${WTFKEY}
      - PSHR=${PSHR}
    restart: unless-stopped
    networks:
      - web

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/blockuseragents.rules:/etc/nginx/blockuseragents.rules:ro
      - ./static:/mnt/web/photoshare/static:ro
      - /mnt/photoshare/media:/mnt/web/photoshare/static/media:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/html
    depends_on:
      - webapp
    environment:
      - DOMAIN=${DOMAIN}
    restart: unless-stopped
    networks:
      - web

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/html
    depends_on:
      - nginx
    command: renew --webroot --webroot-path=/var/www/html --non-interactive

volumes:
  certbot-etc:
  certbot-var:
  webroot:

networks:
  web: 