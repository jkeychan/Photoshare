{% extends "base.html" %}

{% block title %}Downloads{% endblock %}

{% block content %}
<h1>Downloads</h1>
<section class="grid-container">
    {% if not files %}
    <p>No files available for download.</p>
    {% else %}
    {% for file in files %}
    <article class="grid-item">
        <a href="{{ url_for('download_file', filename=file) }}" download="{{ file }}">
            {{ file }}
        </a>
    </article>
    {% endfor %}
    {% endif %}
</section>
{% endblock %}
